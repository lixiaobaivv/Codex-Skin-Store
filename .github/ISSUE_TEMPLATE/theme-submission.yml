name: 主题投稿
description: 上传由主题工坊生成的标准投稿包，等待自动检查与维护者审核。
title: "[Theme]: "
labels: ["theme-submission"]
body:
  - type: markdown
    attributes:
      value: |
        请先使用 [在线主题工坊](https://lixiaobaivv.github.io/Codex-Skin-Store/submit/) 制作主题并下载标准投稿包。
        投稿不会立即发布；维护者审核后，由可信 CI 验证、构建并签名。不要上传密钥、未授权素材或用户数据。
  - type: textarea
    id: archive
    attributes:
      label: 标准投稿包
      description: 将主题工坊生成的 codex-skin-submission-*.zip 拖到这里，等待上传完成后再提交。
      placeholder: 把 ZIP 文件拖到这里……
    validations:
      required: true
  - type: textarea
    id: license
    attributes:
      label: 作品与素材许可
      description: 写明主题、图片、字体等素材的作者、来源和可再分发许可。
    validations:
      required: true
  - type: dropdown
    id: platforms
    attributes:
      label: 希望支持的平台
      multiple: true
      options:
        - macOS
        - Windows
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: 安全确认
      options:
        - label: 投稿包由 Codex-Skin-Store 主题工坊生成，未手动加入其他文件。
          required: true
        - label: 我拥有全部素材的投稿与再分发权，并理解合并前仍需自动检查和维护者审核。
          required: true
